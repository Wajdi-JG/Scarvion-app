services:
  - type: web
    name: scarvion-app
    runtime: node
    region: frankfurt            # changer si besoin: oregon, ohio, singapore, virginia
    plan: free                   # free | starter | standard | ...
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false              # à saisir manuellement dans le dashboard Render
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
