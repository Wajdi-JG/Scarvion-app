<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarvion AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Navigation */
        nav {
            display: none;
        }
        
        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8faf7 50%, #00d4aa 100%);
            padding: 60px 40px;
            text-align: center;
        }
        
        .hero-content {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 24px;
            color: #000;
            font-weight: 700;
        }
        
        .hero-subtitle {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn-primary {
            background: #000;
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #222;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: #000;
            padding: 14px 32px;
            border: 2px solid #000;
            border-radius: 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary:hover {
            background: #000;
            color: #fff;
            transform: translateY(-2px);
        }
        
        .hero-visual {
            display: none;
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 16px 20px;
                flex-wrap: wrap;
            }
            
            .nav-links {
                display: none;
            }
            
            .hero {
                flex-direction: column;
                padding: 40px 20px;
                min-height: auto;
            }
            
            .hero-content {
                padding-right: 0;
                order: unset;
            }
            
            .hero-visual {
                display: none;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .nav-links {
                display: flex;
                width: 100%;
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <img src="logo.png" alt="Scarvion" style="height: 120px; margin-bottom: 24px;" />
            <h1>Boost your business with Scarvion AI Agents</h1>
            <p class="hero-subtitle">
                Automate sales, recover lost revenue, and deliver personalized shopping experiences  all in real time
            </p>
            <div class="hero-buttons">
                <a href="https://link.scarvion.com/widget/form/8phmaAmz1MG7scTZzXDB" target="_blank" class="btn-primary">Sign up for free</a>
                <a href="https://app.scarvion.com" target="_blank" class="btn-secondary">Sign in</a>
            </div>
        </div>
        <div class="hero-visual">
            🤖
        </div>
    </section>
    
    <!-- Chat Widget -->
    <div 
      data-chat-widget 
      data-widget-id="69cd13cd862d914edfffe70a" 
      data-location-id="BwOIkv8943JLu1XJhVC1">
    </div>
    <script 
      src="https://widgets.leadconnectorhq.com/loader.js"  
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" 
      data-widget-id="69cd13cd862d914edfffe70a">
    </script>
</body>
</html>
